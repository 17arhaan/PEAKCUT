services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peakcut
    ports:
      - "5432:5432"
    volumes:
      - peakcut_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peakcut"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  peakcut_pgdata:
