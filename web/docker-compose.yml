services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shorts_factory
    ports:
      - "5432:5432"
    volumes:
      - shorts_factory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shorts_factory"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  shorts_factory_pgdata:
