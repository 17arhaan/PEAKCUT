name: CI

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/ci.yml"
  schedule:
    # Nightly heavy suite (real renders, resume/repair integration) at 03:17 UTC.
    - cron: "17 3 * * *"
  workflow_dispatch:

# A newer push supersedes an in-flight run of the same ref -- don't burn 2x
# minutes finishing a run whose commit is already stale. Keyed by event too,
# so a manual/nightly heavy run and a push-triggered fast run never cancel
# each other (they share the ref but test different things).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  SHORTS_WHISPER_MODEL: tiny
  SHORTS_LLM: stub

jobs:
  # Fast suite: everything except the four integration-heavy modules
  # (measured: those four are ~900s of the 985s total locally; the rest is
  # ~85s). Runs on every push/PR so the signal is quick and reliable.
  worker-fast:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (ffmpeg with libass, espeak-ng, mediapipe GL)
        run: |
          sudo apt-get update -q
          # libgl*/libegl/libgles: MediaPipe (face detection) dlopens libGLESv2.so.2
          # on Linux — absent by default on the runner, unlike macOS.
          sudo apt-get install -y -q ffmpeg espeak-ng libgl1 libglib2.0-0 libgles2 libegl1
          ffmpeg -hide_banner -filters | grep -q subtitles  # libass sanity

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "worker/uv.lock"

      - name: Cache model weights (whisper/PANNs/silero/MMS_FA)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/panns_data
          key: worker-models-v1

      - name: Sync environment
        working-directory: worker
        run: uv sync --frozen

      - name: Doctor
        working-directory: worker
        run: uv run shorts doctor

      - name: Fast tests (stub mode, no API keys)
        working-directory: worker
        run: >
          uv run pytest tests/ -v
          --ignore=tests/test_resume.py
          --ignore=tests/test_repair.py
          --ignore=tests/test_e2e.py
          --ignore=tests/test_pipeline.py

  # Heavy suite: full-pipeline integration tests (real renders, resume
  # checkpoints, repair loops). Nightly + on-demand -- too slow for every push.
  worker-heavy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (ffmpeg with libass, espeak-ng, mediapipe GL)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg espeak-ng libgl1 libglib2.0-0 libgles2 libegl1
          ffmpeg -hide_banner -filters | grep -q subtitles

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "worker/uv.lock"

      - name: Cache model weights (whisper/PANNs/silero/MMS_FA)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/panns_data
          key: worker-models-v1

      - name: Sync environment
        working-directory: worker
        run: uv sync --frozen

      - name: Doctor
        working-directory: worker
        run: uv run shorts doctor

      - name: Heavy tests (stub mode, no API keys)
        working-directory: worker
        run: >
          uv run pytest -v
          tests/test_resume.py tests/test_repair.py
          tests/test_e2e.py tests/test_pipeline.py
