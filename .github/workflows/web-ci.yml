name: web-ci

# Secret-free by design (plan Task 14): a Postgres service container, local
# disk storage, and STUB_WORKER=1 (see web/lib/worker.ts) are the whole
# story -- no Neon, R2, or Modal account needed to get a green run. Every
# secret-shaped env var below is a fixed dummy value, not a repo secret.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

# A newer push supersedes an in-flight run of the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: peakcut_test
        ports:
          - 5432:5432
        # Wait for Postgres to actually accept connections before any step
        # below tries to migrate/query it -- the service container starts in
        # parallel with `Install dependencies`, not before it.
        options: >-
          --health-cmd "pg_isready -U postgres -d peakcut_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/peakcut_test
      # Dummy test-only values -- never real credentials. AUTH_DEV enables
      # the passwordless dev sign-in provider the e2e specs use.
      AUTH_SECRET: dummy-auth-secret-for-ci-only
      AUTH_DEV: "1"
      CRON_SECRET: dummy-cron-secret-for-ci-only
      BILLING_WEBHOOK_SECRET: dummy-billing-webhook-secret-for-ci-only
      # Swaps in StubWorker (web/lib/worker.ts) everywhere -- no uv/whisper/
      # ffmpeg subprocess, no Modal. playwright.config.ts's webServer also
      # sets this explicitly for the dev server it spawns.
      STUB_WORKER: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # `npm install` (not `npm ci`): Tailwind's native engine pulls
        # platform-specific optional deps (@emnapi/* on Linux) that a
        # macOS-generated lock can't fully pin, so let npm resolve them for
        # the runner's platform instead of hard-failing on a lock mismatch.
        run: npm install --no-audit --no-fund

      - name: Push DB schema
        run: npx drizzle-kit push --force

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Unit tests (vitest)
        run: npm run test

      - name: E2E tests (playwright)
        run: npx playwright test
